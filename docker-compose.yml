services:
  # =========================================================================
  # Redpanda: Event broker compatible with Kafka API.
  # Handles raw article and verified article streams asynchronously.
  # =========================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.10
    container_name: redpanda
    # We run in standalone single-core mode to minimize CPU usage on local machines.
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --default-log-level=info
      # Setup internal PLAINTEXT port for docker network, and OUTSIDE port for localhost python clients.
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - ./redpanda_data:/var/lib/redpanda/data

  # =========================================================================
  # Redpanda Console: Web UI for cluster management.
  # Allows us to view topics, messages, offsets, and consumer groups.
  # URL: http://localhost:8080
  # =========================================================================
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    container_name: redpanda-console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console --config.filepath=/tmp/config.yml"
    environment:
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  # =========================================================================
  # ChromaDB: Vector database for semantic context storage and retrieval.
  # =========================================================================
  chroma:
    image: chromadb/chroma:0.6.3
    container_name: chromadb
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    ports:
      - "8000:8000"

services:
  # =========================================================================
  # Redpanda: Event broker compatible with Kafka API.
  # Handles raw article and verified article streams asynchronously.
  # =========================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.10
    container_name: redpanda
    # We run in standalone single-core mode to minimize CPU usage on local machines.
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --default-log-level=info
      # Setup internal PLAINTEXT port for docker network, and OUTSIDE port for localhost python clients.
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - ./redpanda_data:/var/lib/redpanda/data

  # =========================================================================
  # Redpanda Console: Web UI for cluster management.
  # Allows us to view topics, messages, offsets, and consumer groups.
  # URL: http://localhost:8080
  # =========================================================================
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    container_name: redpanda-console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console --config.filepath=/tmp/config.yml"
    environment:
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  # =========================================================================
  # ChromaDB: Vector database for semantic context storage and retrieval.
  # =========================================================================
  chroma:
    image: chromadb/chroma:0.6.3
    container_name: chromadb
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    ports:
      - "8002:8000"

  # =========================================================================
  # PostgreSQL: Primary relational database
  # =========================================================================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: news_aggregator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # =========================================================================
  # Taut: AI Efficiency Middleware Proxy
  # =========================================================================
  taut:
    image: python:3.11-slim
    container_name: taut
    volumes:
      - ../taut:/taut
    command: bash -c "pip install --upgrade pip && pip install '/taut[cache,proxy]' && python -m taut.proxy.server --port 8000"
    ports:
      - "8000:8000"
    environment:
      - TAUT_PROXY_HOST=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_API_BASE=http://host.docker.internal:11434
      # Defaults match newsagg/core/llm.py TIER_MODELS exactly (ADR-3):
      # simple -> ollama/llama3.1, standard & complex -> gemini/gemini-2.5-flash.
      - TAUT_ROUTING_TIERS={"simple":["ollama/${OLLAMA_MODEL:-llama3.1}"],"standard":["gemini/${GEMINI_MODEL:-gemini-2.5-flash}"],"complex":["gemini/${GEMINI_MODEL:-gemini-2.5-flash}"]}
    healthcheck:
      # No curl in python:3.11-slim, so hit taut's own metrics endpoint
      # (taut/proxy/routes.py: GET /v1/taut/metrics) with a stdlib client.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/taut/metrics', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


volumes:
  postgres_data:
